<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuários — RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #101010;
    --bg2: #100f08;
    --bg3: #110e07;
    --border: #302808;
    --border2: #604808;
    --gold: #c9a84c;
    --gold2: #352810;
    --gold-dim: #dba844;
    --text: #ffffff;
    --text2: #806019;
    --text3: #ffffff;
    --red: #8b5020;
    --red2: #c07040;
    --radius: 6px;
  }

  body {
    font-family: 'Crimson Text', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.5;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

  input {
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 15px; color: var(--text);
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px; width: 100%;
    transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: var(--gold-dim); background: var(--bg3); }

  button {
    font-family: 'Crimson Text', Georgia, serif;
    cursor: pointer; border-radius: var(--radius);
    border: 1px solid var(--border2); background: transparent;
    color: var(--text2); padding: 7px 14px; font-size: 14px;
    transition: all 0.18s;
  }
  button:hover { background: var(--bg3); color: var(--gold2); border-color: var(--gold-dim); }
  button:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--bg3); border-color: var(--gold-dim);
    color: var(--gold); font-family: 'Cinzel', serif;
    font-size: 13px; letter-spacing: 0.5px;
  }
  .btn-primary:hover { background: #201808; color: var(--gold2); border-color: var(--gold); }
  .btn-icon {
    padding: 5px 9px; font-size: 15px; min-width: 30px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .btn-danger { color: var(--red2); border-color: transparent; }
  .btn-danger:hover { background: rgba(139,80,32,0.15); border-color: var(--red); color: #e09060; }
  .btn-logout {
    background: transparent; border-color: var(--border);
    color: var(--text3); font-size: 12px; padding: 5px 10px;
  }
  .btn-logout:hover { color: var(--red2); border-color: var(--red); background: rgba(139,80,32,0.1); }

  .wrap { max-width: 600px; margin: 0 auto; padding: 1.5rem; }

  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem; padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
    gap: 10px; flex-wrap: wrap;
  }
  .page-title {
    font-family: 'Cinzel', serif; font-size: 20px;
    color: var(--gold); letter-spacing: 1px;
  }

  .section-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 18px 0 12px; color: var(--gold-dim);
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.8px;
  }
  .section-divider::before, .section-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* Add user form */
  .add-form {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 16px;
  }
  .add-form-title {
    font-family: 'Cinzel', serif; font-size: 12px;
    color: var(--gold-dim); letter-spacing: 0.6px; margin-bottom: 10px;
  }
  .form-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  .form-row .field-group { flex: 1; min-width: 120px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-label {
    font-family: 'Cinzel', serif; font-size: 10px;
    color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase;
  }

  /* User list */
  .user-list { display: flex; flex-direction: column; gap: 8px; }
  .user-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--bg2);
    border: 1px solid var(--border); border-radius: var(--radius);
    transition: border-color 0.2s; gap: 10px;
  }
  .user-item:hover { border-color: var(--border2); }
  .user-item-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .user-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--bg3); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 13px;
    color: var(--gold-dim); flex-shrink: 0;
  }
  .user-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .user-pass { font-size: 13px; color: var(--text3); margin-top: 1px; font-style: italic; }
  .user-actions { display: flex; gap: 6px; align-items: center; }

  /* Inline edit */
  .inline-edit { display: none; flex: 1; gap: 6px; align-items: center; }
  .inline-edit.open { display: flex; }
  .inline-edit input { flex: 1; padding: 5px 8px; font-size: 13px; }

  .mestre-badge {
    font-family: 'Cinzel', serif; font-size: 10px;
    color: var(--gold); border: 1px solid var(--border2);
    padding: 2px 8px; border-radius: 4px;
    background: var(--bg3); letter-spacing: 0.5px;
  }

  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg3); border: 1px solid var(--gold-dim);
    color: var(--gold); font-family: 'Cinzel', serif;
    font-size: 13px; letter-spacing: 0.5px;
    padding: 10px 18px; border-radius: var(--radius);
    opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 9999;
  }

  .info-note {
    font-size: 13px; color: var(--text3); font-style: italic;
    margin-bottom: 12px; padding: 8px 12px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius);
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="page-header">
    <div class="page-title">⚙ Usuários</div>
    <div style="display:flex;gap:8px">
      <button class="btn-logout" onclick="window.location.href='index.html'">← Voltar</button>
    </div>
  </div>

  <div class="info-note">
    ⚠ Alterações aqui são salvas localmente no arquivo <code>login.html</code>. 
    Anote as senhas para atualizar o arquivo no GitHub.
  </div>

  <!-- Mestre -->
  <div class="section-divider">Mestre</div>
  <div class="user-list" id="mestreList"></div>

  <!-- Jogadores -->
  <div class="section-divider">Jogadores</div>

  <div class="add-form">
    <div class="add-form-title">Adicionar Jogador</div>
    <div class="form-row">
      <div class="field-group">
        <label class="field-label">Usuário</label>
        <input type="text" id="novoUsuario" placeholder="nome (minúsculas)" autocomplete="off">
      </div>
      <div class="field-group">
        <label class="field-label">Senha</label>
        <input type="text" id="novaSenha" placeholder="senha" autocomplete="off">
      </div>
      <button class="btn-primary" onclick="adicionarJogador()" style="flex-shrink:0;margin-top:18px">+ Adicionar</button>
    </div>
  </div>

  <div class="user-list" id="jogadoresList"></div>

  <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
    <button class="btn-primary" onclick="exportarCodigo()" style="width:100%">
      📋 Gerar código para login.html
    </button>
  </div>

  <div id="codeOutput" style="display:none;margin-top:12px">
    <div style="font-family:'Cinzel',serif;font-size:11px;color:var(--gold-dim);margin-bottom:6px;letter-spacing:0.6px">
      SUBSTITUA ESTAS LINHAS NO SEU login.html:
    </div>
    <textarea id="codeArea" readonly style="min-height:120px;font-family:monospace;font-size:13px;background:#0a0a0a;border-color:var(--border2);resize:vertical"></textarea>
    <button onclick="copiarCodigo()" style="margin-top:6px;width:100%" class="btn-primary">📋 Copiar código</button>
  </div>
</div>

<div id="toast"></div>

<script>
const logado = sessionStorage.getItem("logado");
const tipo   = sessionStorage.getItem("tipo");
if (!logado) window.location.href = "login.html";
if (tipo !== "mestre") window.location.href = "index.html";

// Default users — loaded from sessionStorage if modified this session
const STORAGE_KEY = "rpg_usuarios_v1";

function getUsuarios() {
  const saved = sessionStorage.getItem(STORAGE_KEY);
  if (saved) return JSON.parse(saved);
  return {
    mestre: { usuario: "mestre", senha: "stars--", tipo: "mestre" },
    jogadores: [
      { usuario: "kael",    senha: "stars" },
      { usuario: "yōko",   senha: "stars" },
      { usuario: "aeyer",  senha: "stars" },
      { usuario: "revan",  senha: "stars" },
      { usuario: "marlide",senha: "stars" }
    ]
  };
}

function salvarUsuarios(data) {
  sessionStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function renderAll() {
  const data = getUsuarios();
  renderMestre(data.mestre);
  renderJogadores(data.jogadores);
}

function renderMestre(m) {
  document.getElementById('mestreList').innerHTML = `
    <div class="user-item">
      <div class="user-item-left">
        <div class="user-avatar">M</div>
        <div>
          <div class="user-name">${m.usuario}</div>
          <div id="mestreSenhaDisplay" class="user-pass">Senha: ${m.senha}</div>
          <div class="inline-edit" id="mestreEdit">
            <input type="text" id="mestreSenhaInput" placeholder="Nova senha" value="${m.senha}">
            <button class="btn-primary" onclick="salvarSenhaMestre()" style="flex-shrink:0">✓</button>
            <button onclick="cancelarEditMestre()" style="flex-shrink:0">✗</button>
          </div>
        </div>
      </div>
      <div class="user-actions">
        <span class="mestre-badge">Mestre</span>
        <button class="btn-icon" onclick="editarSenhaMestre()" title="Editar senha">✏️</button>
      </div>
    </div>`;
}

function editarSenhaMestre() {
  document.getElementById('mestreEdit').classList.add('open');
  document.getElementById('mestreSenhaDisplay').style.display = 'none';
  document.getElementById('mestreSenhaInput').focus();
}
function cancelarEditMestre() {
  document.getElementById('mestreEdit').classList.remove('open');
  document.getElementById('mestreSenhaDisplay').style.display = '';
}
function salvarSenhaMestre() {
  const nova = document.getElementById('mestreSenhaInput').value.trim();
  if (!nova) { showToast('Senha não pode ser vazia!'); return; }
  const data = getUsuarios();
  data.mestre.senha = nova;
  salvarUsuarios(data);
  showToast('Senha do mestre atualizada!');
  renderAll();
}

function renderJogadores(jogadores) {
  const list = document.getElementById('jogadoresList');
  if (!jogadores.length) {
    list.innerHTML = '<div style="text-align:center;padding:1.5rem;color:var(--text3);font-style:italic;font-size:14px">Nenhum jogador cadastrado.</div>';
    return;
  }
  list.innerHTML = jogadores.map((j, i) => {
    const initials = (j.usuario||'?')[0].toUpperCase();
    return `<div class="user-item" id="userItem_${i}">
      <div class="user-item-left">
        <div class="user-avatar">${initials}</div>
        <div style="flex:1;min-width:0">
          <div class="user-name">${j.usuario}</div>
          <div class="user-pass" id="passDisplay_${i}">Senha: ${j.senha}</div>
          <div class="inline-edit" id="passEdit_${i}">
            <input type="text" id="passInput_${i}" placeholder="Nova senha" value="${j.senha}">
            <button class="btn-primary" onclick="salvarSenha(${i})" style="flex-shrink:0">✓</button>
            <button onclick="cancelarEdit(${i})" style="flex-shrink:0">✗</button>
          </div>
        </div>
      </div>
      <div class="user-actions">
        <button class="btn-icon" onclick="editarSenha(${i})" title="Editar senha">✏️</button>
        <button class="btn-icon btn-danger" onclick="removerJogador(${i})" title="Remover">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function editarSenha(i) {
  document.getElementById('passEdit_' + i).classList.add('open');
  document.getElementById('passDisplay_' + i).style.display = 'none';
  document.getElementById('passInput_' + i).focus();
}
function cancelarEdit(i) {
  document.getElementById('passEdit_' + i).classList.remove('open');
  document.getElementById('passDisplay_' + i).style.display = '';
}
function salvarSenha(i) {
  const nova = document.getElementById('passInput_' + i).value.trim();
  if (!nova) { showToast('Senha não pode ser vazia!'); return; }
  const data = getUsuarios();
  data.jogadores[i].senha = nova;
  salvarUsuarios(data);
  showToast('Senha atualizada!');
  renderAll();
}

function adicionarJogador() {
  const usuario = document.getElementById('novoUsuario').value.toLowerCase().trim();
  const senha   = document.getElementById('novaSenha').value.trim();
  if (!usuario || !senha) { showToast('Preencha usuário e senha!'); return; }
  const data = getUsuarios();
  if (data.jogadores.find(j => j.usuario === usuario) || usuario === 'mestre') {
    showToast('Usuário já existe!'); return;
  }
  data.jogadores.push({ usuario, senha });
  salvarUsuarios(data);
  document.getElementById('novoUsuario').value = '';
  document.getElementById('novaSenha').value = '';
  showToast('Jogador adicionado!');
  renderAll();
}
window.adicionarJogador = adicionarJogador;

function removerJogador(i) {
  const data = getUsuarios();
  const nome = data.jogadores[i].usuario;
  if (!confirm(`Remover jogador "${nome}"?`)) return;
  data.jogadores.splice(i, 1);
  salvarUsuarios(data);
  showToast('Jogador removido!');
  renderAll();
}

function exportarCodigo() {
  const data = getUsuarios();
  const jogadoresArr = data.jogadores.map(j => `"${j.usuario}"`).join(', ');
  const senhasObj = data.jogadores.map(j => `  "${j.usuario}": "${j.senha}"`).join(',\n');

  const code = `// ── COLE ISSO NO login.html ──
const senhasMestre = "${data.mestre.senha}";
const jogadores = [${jogadoresArr}];
const senhasJogadores = {\n${senhasObj}\n};

// Substituir a função logar() por:
function logar() {
  const usuario = document.getElementById("usuario").value.toLowerCase().trim();
  const senha   = document.getElementById("senha").value.trim();
  const erro    = document.getElementById("erro");
  erro.textContent = "";

  if (usuario === "${data.mestre.usuario}" && senha === senhasMestre) {
    sessionStorage.setItem("logado", "true");
    sessionStorage.setItem("tipo", "mestre");
    window.location.href = "index.html";
    return;
  }

  if (jogadores.includes(usuario) && senhasJogadores[usuario] === senha) {
    sessionStorage.setItem("logado", "true");
    sessionStorage.setItem("tipo", "jogador");
    sessionStorage.setItem("usuario", usuario);
    window.location.href = "index.html";
  } else {
    erro.textContent = "Usuário ou senha incorretos!";
    document.getElementById("senha").value = "";
  }
}`;

  document.getElementById('codeArea').value = code;
  document.getElementById('codeOutput').style.display = 'block';
  document.getElementById('codeOutput').scrollIntoView({ behavior: 'smooth' });
}
window.exportarCodigo = exportarCodigo;

function copiarCodigo() {
  const area = document.getElementById('codeArea');
  area.select();
  document.execCommand('copy');
  showToast('Código copiado!');
}
window.copiarCodigo = copiarCodigo;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2500);
}

// expose for inline handlers
window.editarSenhaMestre = editarSenhaMestre;
window.cancelarEditMestre = cancelarEditMestre;
window.salvarSenhaMestre = salvarSenhaMestre;
window.editarSenha = editarSenha;
window.cancelarEdit = cancelarEdit;
window.salvarSenha = salvarSenha;
window.removerJogador = removerJogador;

renderAll();
</script>
</body>
</html>
